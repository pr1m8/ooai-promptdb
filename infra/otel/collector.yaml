receivers:
  otlp:
    protocols:
      http:

exporters:
  debug:
  prometheus:
    endpoint: "0.0.0.0:9464"
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      exporters: [otlphttp/loki, debug]
